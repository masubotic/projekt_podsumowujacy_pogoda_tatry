name: Refresh weather data

on:
  schedule:
    - cron: "0 4 * * 1"  # Co poniedziałek o 4:00 UTC
  workflow_dispatch:       # Możliwość ręcznego uruchomienia

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run api_refresh.py
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          OPENWEATHERAPI_KEY: ${{ secrets.OPENWEATHERAPI_KEY }}
        run: uv run python Scripts/api_refresh.py --all

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Automatyczne odświeżenie danych pogodowych [skip ci]"
          git push
